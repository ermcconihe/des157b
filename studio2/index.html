<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Yourself</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Shrikhand&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap" rel="stylesheet">


    <!-- Meta tag for mobile support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- style sheet -->
     <link rel="stylesheet" href="styles.css">

    <!-- script -->
     <script src="script.js" defer></script>
</head>

<body>

    <header>
        <h1>weathering my view</h1>
        
    </header>

    <div id="content-container">

        <section id="viewing-area">
            
            <div id="img-container">
                <img src="images/placeholder.png" alt="img1" width="600" height="450">
                <p id="description">click on the tiles to see the view from my window change</p>
            </div>
            
            <section id="info">
                <h2 id="my-time">time:</h2>
                <p id="my-date">date:</p>
                <p id="my-temp">temperature:</p>
                <p id="my-weather">weather:</p>
                <p id="my-mood">mood:</p>
            </section>
        </section>

        <section id="selection-area">
            <section class="tiles" id="point1">
                <p>7:46</p>
            </section>

            <section class="tiles" id="point2">
                <p>11:49</p>
            </section>

            <section class="tiles" id="point3">
                <p>1:45</p>
            </section>

            <section class="tiles" id="point4">
                <p>3:17</p>
            </section>

            <section class="tiles" id="point5">
                <p>5:24</p>
            </section>

            <section class="tiles" id="point6">
                <p>6:52</p>
            </section>

            <section class="tiles" id="point7">
                <p>7:33</p>
            </section>

            <section class="tiles" id="point8">
                <p>10:36</p>
            </section>

        </section>

    </div>
    
</body>

</html>
