<body>
    
    <video id="myVideo" poster="images/fish.jpg" muted autoplay loop playsinline>

        <source src="media/fish2.webm" type="video/webm">
        <source src="media/fish2.mp4" type="video/mp4">

        <p>Your browser doesn't support HTML5 video. Here is a <a href="media/fish2.mp4">link to the video</a> instead.</p>
    </video>
    <i class="fas fa-expand"></i>

    <section id="poem">
        <p id="line1" class="hidden">i keep coming back to this mental place <br>lost in the deep and lonely blue</p>
        <p id="line2" class="hidden">the perpetual spin lures me in <br>drowning in the comfort of the pain</p>
        <p id="line3" class="hidden">trying to tread free from the gloom <br>just to circle back to the same place</p>
        <p id="line4" class="hidden">forever stuck in this mental state</p>
    </section>

    <section id="hover-area">
        <p>break free</p>
    </section>
    
    <div id="cover" class="hidden"></div>

    <section id="calm" class="hidden">
        <p>just breathe</p>
    </section>
