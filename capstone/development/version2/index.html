<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>capstone version 1</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Shrikhand&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap" rel="stylesheet">

    <link href="styles.css" rel="stylesheet">

    <!-- My Script -->
    <script src="script.js" defer></script>

<body>

    <div id="main-map">
        <div id="map-area">
            <img src="images/map-draft2.png" id="map" alt="map">

            <img src="images/creek.png" id="creek" alt="creek">
            <img src="images/tent.png" id="tent" alt="tent">
            <img src="images/deer.png" id="deer" alt="deer">
            <img src="images/stump.png" id="stump" alt="stump">
            <img src="images/stove.png" id="stove" alt="stove">
            <img src="images/swing.png" id="swing" alt="swing">
            <img src="images/mac.png" id="mac" alt="mac">

        </div>
        

        <h1>welcome to the cabins</h1>
        <p id="map-info">click around the points of interest to explore, what will you discover?</p>


    </div>
    <!-- class="overlays"  -->
    <div id="creek-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>it's always changing</h2>
        </div>
        
    </div>

    <div id="tent-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>seeing stars</h2>
        </div>
        
    </div>

    <div id="deer-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>the memories are on the walls</h2>
        </div>
        
    </div>

    <div id="stump-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>logging the past</h2>
        </div>
        
    </div>

    <div id="stove-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>changing over time</h2>
        </div>
        
    </div>

    <div id="swing-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>you're never too old</h2>
        </div>
        
    </div>

    <div id="mac-overlay" class="overlay-offscreen">
        <i class="fa-solid fa-angles-left"></i>

        <div class="overlay-content">
            <h2>names hold meaning</h2>
        </div>
        
    </div>
